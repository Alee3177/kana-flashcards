<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ORIWISH Kana Cards</title>
  <style>
    :root{
      --bg:#f7f4ee;
      --card:#fffdf8;
      --ink:#1f1a17;
      --muted:#7a7068;
      --line:#e8dfd3;
      --gold:#b3925f;
      --shadow:0 10px 28px rgba(42,27,15,.08);
      --radius:20px;
      --danger:#b42318;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Hiragino Sans","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,#faf7f2 0%, #f3eee6 100%);
      color:var(--ink);
    }
    .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 36px}
    .hero{
      background:rgba(255,253,248,.78);
      border:1px solid var(--line);
      border-radius:28px;
      padding:22px 18px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--gold);font-weight:700}
    h1{margin:8px 0 8px;font-size:28px;line-height:1.2}
    .sub{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
    .toolbar{
      display:grid;grid-template-columns:1fr;gap:12px;margin:16px 0 20px;
      background:rgba(255,253,248,.78);
      border:1px solid var(--line);
      border-radius:22px;padding:14px;box-shadow:var(--shadow);
    }
    .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    button,select,input{
      font:inherit;
      border:1px solid var(--line);
      background:#fffdf9;
      color:var(--ink);
      border-radius:999px;
      padding:10px 14px;
    }
    button{cursor:pointer;transition:.2s transform,.2s background,.2s border-color}
    button:hover{transform:translateY(-1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none}
    button.active{background:#f4ead8;border-color:#d7c09b;color:#5a4527;font-weight:700}
    .primary{background:#202020;color:#fff;border-color:#202020}
    .ghost{background:transparent}
    .stat{font-size:13px;color:var(--muted)}
    .status-error{color:var(--danger)!important}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:16px;
    }
    .card-wrap{perspective:1200px;min-height:420px}
    .card{
      position:relative;width:100%;height:420px;transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.2,.8,.2,1);
      cursor:pointer;
    }
	.card.active {
      outline: 3px solid #dc2626;
      outline-offset: 2px;
    }
    .card.is-flipped{transform:rotateY(180deg)}
    .face{
      position:absolute;inset:0;backface-visibility:hidden;
      border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);overflow:hidden;
      background:var(--card);
      display:flex;flex-direction:column;
    }
    .front{
      justify-content:space-between;
      padding:14px;
      background:
        radial-gradient(circle at top right, rgba(179,146,95,.14), transparent 34%),
        linear-gradient(180deg, #fffdf9 0%, #f8f2e9 100%);
    }
    .front .tag,
    .back .tag{
      align-self:flex-start;
      font-size:11px;font-weight:700;letter-spacing:.12em;
      color:var(--gold);background:rgba(179,146,95,.08);
      border:1px solid rgba(179,146,95,.18);
      padding:6px 10px;border-radius:999px;
    }
    .art{
      flex:1;display:flex;align-items:center;justify-content:center;position:relative;
      color:#c6aa7f;font-size:58px;font-weight:700;letter-spacing:.02em;
    }
    .art::before{
      content:"";position:absolute;width:132px;height:132px;border-radius:50%;
      background:radial-gradient(circle, rgba(179,146,95,.16) 0%, rgba(179,146,95,.04) 60%, transparent 72%);
    }
    .motif{
      position:absolute;top:18px;right:18px;width:42px;height:42px;
      border-radius:12px;border:1px solid rgba(179,146,95,.2);
      background:rgba(255,250,242,.92);display:flex;align-items:center;justify-content:center;
      color:#b3925f;font-size:22px;box-shadow:0 4px 14px rgba(42,27,15,.06);
    }
    .motif.vessel{font-size:18px}
    .motif.water,.motif.sky{font-size:20px}
    .kana{position:relative;font-size:86px;line-height:1;font-weight:700;color:#231b17}
    .roman{font-size:16px;color:var(--muted);text-align:center;margin-top:10px;letter-spacing:.08em}
    .hint{font-size:12px;color:var(--muted);text-align:center}
    .back{transform:rotateY(180deg);padding:14px;background:#fffdfa;overflow:auto}
    .mini{font-size:13px;color:var(--muted);margin:0 0 8px;line-height:1.6}
    table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}
    th,td{border:1px solid var(--line);padding:6px 6px;text-align:left;vertical-align:top}
    th{background:#faf4eb}
    .actions{
      display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding:8px 0 4px;
      position:sticky;bottom:0;
      background:linear-gradient(180deg, rgba(255,253,250,0), rgba(255,253,250,.94) 30%, rgba(255,253,250,1) 100%);
    }
    .footer-note{margin-top:18px;font-size:12px;color:var(--muted);text-align:center}
    code{background:#f6efe5;padding:1px 4px;border-radius:6px}
    @media (max-width:640px){
      h1{font-size:24px}
      .card-wrap,.card{min-height:470px;height:470px}
      .kana{font-size:74px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">ORIWISH · KANA CARD</div>
      <h1>平假名互動圖卡｜あ行・か行・さ行</h1>
<p class="sub" style="color:#dc2626;">點一下卡片可翻面；按按鈕可播放 mp3。單字模式採分段音檔播放，單字之間停頓 0.5 秒，並各播放兩次。</p>
    </section>

    <section class="toolbar" aria-label="控制列">
      <div class="row chips" id="rowFilters"></div>
      <div class="row">
        <button id="playAllBtn" class="primary">播放目前卡片 mp3</button>
        <button id="shuffleBtn" class="ghost">隨機排序</button>
        <button id="flipAllBtn" class="ghost">全部翻到背面</button>
        <button id="autoPlayBtn" class="ghost">自動播放：關</button>
        <label class="stat">播放模式：
          <select id="audioMode">
            <option value="kana">單音</option>
            <option value="words">單字</option>
          </select>
        </label>

        <label class="stat">搜尋：
          <input id="searchInput" type="search" placeholder="輸入 kana / romaji / 中文" />
        </label>
      </div>
      <div class="stat" id="resultStat">目前顯示 15 張卡</div>
      <div class="stat" id="audioStatus">音檔播放模式已啟用</div>
    </section>

    <section class="grid" id="grid" aria-live="polite"></section>

    <div id="lineAudioTip" style="display:none; margin-top:12px; text-align:center;">
      <a id="openExternalBtn" href="#" style="
        display:inline-block;
        padding:12px 18px;
        background:#16a34a;
        color:#fff;
        border-radius:10px;
        text-decoration:none;
        font-weight:bold;
      ">
        請改用瀏覽器開啟（LINE 內朗讀可能無聲）
      </a>
    </div>

  </div>

  <script>
    const cards = [
      {row:'A-row', kana:'あ', romaji:'a', wordCount:2, art:'晨光', hint:'開始感', icon:'☀︎', motif:'sun', items:[['あ','あ / a','啊 / a'],['あい','あい / ai','愛 / love'],['あお','あお / ao','藍色 / blue']]},
      {row:'A-row', kana:'い', romaji:'i', wordCount:2, art:'絲線', hint:'細長線條', icon:'〰', motif:'thread', items:[['い','い / i','衣 / i'],['いえ','いえ / ie','家 / house'],['いいえ','いいえ / iie','不 / no']]},
      {row:'A-row', kana:'う', romaji:'u', wordCount:1, art:'海浪', hint:'圓弧呼氣', icon:'≈', motif:'wave', items:[['う','う / u','嗚 / u'],['うえ','うえ / ue','上面 / up']]},
      {row:'A-row', kana:'え', romaji:'e', wordCount:3, art:'枝葉', hint:'轉折線條', icon:'❦', motif:'leaf', items:[['え','え / e','欸 / e'],['絵','え / e','繪畫 / picture'],['映画','えいが / eiga','電影 / movie']]},
      {row:'A-row', kana:'お', romaji:'o', wordCount:1, art:'圓月', hint:'圓形構圖', icon:'◯', motif:'moon', items:[['お','お / o','喔 / o'],['あお','あお / ao','藍色 / blue']]},

      {row:'KA-row', kana:'か', romaji:'ka', wordCount:3, art:'花', hint:'柔曲線', icon:'✿', motif:'flower', items:[['か','か / ka','卡 / ka'],['かい','かい / kai','貝 / shell'],['かお','かお / kao','臉 / face'],['かき','かき / kaki','柿子 / persimmon']]},
      {row:'KA-row', kana:'き', romaji:'ki', wordCount:1, art:'樹', hint:'木紋線條', icon:'✦', motif:'tree', items:[['き','き / ki','樹 / tree'],['きく','きく / kiku','菊花 / chrysanthemum']]},
      {row:'KA-row', kana:'く', romaji:'ku', wordCount:2, art:'彎月', hint:'柔和曲線', icon:'☾', motif:'crescent', items:[['く','く / ku','庫 / ku'],['いか','いか / ika','魷魚 / squid'],['くち','くち / kuchi','嘴巴 / mouth']]},
      {row:'KA-row', kana:'け', romaji:'ke', wordCount:1, art:'羽毛', hint:'流動筆觸', icon:'❦', motif:'feather', items:[['け','け / ke','客 / ke'],['いけ','いけ / ike','池 / pond']]},
      {row:'KA-row', kana:'こ', romaji:'ko', wordCount:1, art:'器皿', hint:'方框 / 容器感', icon:'⬒', motif:'vessel', items:[['こ','こ / ko','口 / ko'],['こい','こい / koi','鯉魚 / carp']]},

      {row:'SA-row', kana:'さ', romaji:'sa', wordCount:3, art:'櫻花', hint:'柔軟紗感', icon:'❀', motif:'sakura', items:[['さ','さ / sa','沙 / sa'],['あさ','あさ / asa','早上 / morning'],['かさ','かさ / kasa','雨傘 / umbrella'],['さけ','さけ / sake','酒 / salmon']]},
      {row:'SA-row', kana:'し', romaji:'shi', wordCount:3, art:'流水', hint:'流線詩感', icon:'∿', motif:'stream', items:[['し','し / shi','西 / shi'],['いし','いし / ishi','石頭 / stone'],['うし','うし / ushi','牛 / cow'],['しか','しか / shika','鹿 / deer']]},
      {row:'SA-row', kana:'す', romaji:'su', wordCount:2, art:'清水', hint:'清透感', icon:'💧', motif:'water', items:[['す','す / su','蘇 / su'],['すし','すし / sushi','壽司 / sushi'],['いす','いす / isu','椅子 / chair']]},
      {row:'SA-row', kana:'せ', romaji:'se', wordCount:2, art:'星', hint:'世界結構', icon:'✧', motif:'star', items:[['せ','せ / se','色 / se'],['せかい','せかい / sekai','世界 / world'],['あせ','あせ / ase','汗 / sweat']]},
      {row:'SA-row', kana:'そ', romaji:'so', wordCount:1, art:'天空', hint:'風與留白', icon:'☁︎', motif:'sky', items:[['そ','そ / so','所 / so'],['うそ','うそ / uso','謊言 / lie']]}
    ];

    let state = {
      filter: 'ALL',
      flippedAll: false,
      q: '',
      audioMode: 'kana',
      playing: false,
      autoPlay: false,
    };

    const grid = document.getElementById('grid');
    const rowFilters = document.getElementById('rowFilters');
    const resultStat = document.getElementById('resultStat');
    const audioStatus = document.getElementById('audioStatus');
    const searchInput = document.getElementById('searchInput');
    const audioMode = document.getElementById('audioMode');
    const playAllBtn = document.getElementById('playAllBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const flipAllBtn = document.getElementById('flipAllBtn');
    const autoPlayBtn = document.getElementById('autoPlayBtn');
    const audioPlayer = new Audio();
    audioPlayer.preload = 'auto';

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function setStatus(message, isError = false){
      if (!audioStatus) return;
      audioStatus.textContent = message;
      audioStatus.classList.toggle('status-error', !!isError);
    }

    function normalizeRomaji(str){
      return String(str || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

function getSingleAudioSrc(card){
  const key = normalizeRomaji(card.romaji);
  return `audio/${key}.mp3`;
}

function getWordSegmentAudioSrc(card, index){
  const key = normalizeRomaji(card.romaji);
  return `audio/${key}_words_${index}.mp3`;
}
    function playAudio(src){
      return new Promise((resolve, reject) => {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        audioPlayer.src = src;
        audioPlayer.onended = () => resolve(true);
        audioPlayer.onerror = () => reject(new Error(src));
        audioPlayer.play().catch(reject);
      });
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function playSingleCard(card){
      await playAudio(getSingleAudioSrc(card));
    }

    async function playWordSegments(card){
      const count = card.wordCount || 0;
      if (!count) throw new Error(`缺少 wordCount：${card.romaji}`);
      for (let i = 1; i <= count; i++) {
        const src = getWordSegmentAudioSrc(card, i);
        await playAudio(src);
        await sleep(500);
        await playAudio(src);
        if (i < count) await sleep(500);
      }
    }

    async function playCard(card, mode='kana'){
      if (mode === 'kana') {
        await playSingleCard(card);
      } else {
        await playWordSegments(card);
      }
    }

    async function playSequential(list, mode='kana'){
      if (!list.length || state.playing) return;
      state.playing = true;
      playAllBtn.disabled = true;
      autoPlayBtn.disabled = true;
      try {
        for (const card of list) {
          try {
            setStatus(`播放中：${card.kana}（${mode === 'kana' ? '單音' : '單字'}）`);
            await playCard(card, mode);
            await sleep(500);
          } catch (err) {
            setStatus(`找不到音檔：${err.message}，請確認 audio 資料夾與檔名。`, true);
            break;
          }
        }
      } finally {
        state.playing = false;
        playAllBtn.disabled = false;
        autoPlayBtn.disabled = false;
      }
    }

    async function autoPlayCards(){
      const list = currentCards();
      if (!list.length || state.playing) return;
      state.playing = true;
      playAllBtn.disabled = true;
      autoPlayBtn.disabled = true;
      try {
for (const card of list) {
  setStatus(`自動播放中：${card.kana}（${state.audioMode === 'kana' ? '單音' : '單字'}）`);

  const cardEls = [...grid.querySelectorAll('.card')];
  cardEls.forEach(el => el.classList.remove('active'));

  const target = cardEls.find(el => el.dataset.kana === card.kana);

  if (target) {
    target.classList.add('active');

    if (!target.classList.contains('is-flipped')) {
      target.classList.add('is-flipped');
    }

    target.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });
  }

  await playCard(card, state.audioMode);
  await sleep(700);
}
        setStatus('自動播放完成');
      } catch (err) {
        setStatus(`自動播放失敗：${err.message}`, true);
      } finally {
        state.playing = false;
        playAllBtn.disabled = false;
        autoPlayBtn.disabled = false;
      }
    }

    function currentCards(){
      const q = state.q.trim().toLowerCase();
      return cards.filter(card => {
        const byRow = state.filter === 'ALL' || card.row === state.filter;
        const text = [card.row, card.kana, card.romaji, card.art, card.hint, ...card.items.flat()].join(' ').toLowerCase();
        return byRow && (!q || text.includes(q));
      });
    }

    function renderFilters(){
      const defs = [['ALL','全部'],['A-row','あ行'],['KA-row','か行'],['SA-row','さ行']];
      rowFilters.innerHTML = defs.map(([key,label]) => `
        <button class="${state.filter===key?'active':''}" data-filter="${key}">${label}</button>
      `).join('');
      [...rowFilters.querySelectorAll('button')].forEach(btn => {
        btn.onclick = () => {
          state.filter = btn.dataset.filter;
          renderFilters();
          renderCards();
        };
      });
    }

    function renderCards(){
      const list = currentCards();
      resultStat.textContent = `目前顯示 ${list.length} 張卡`;

      grid.innerHTML = list.map(card => {
        const tableRows = card.items.map(row => `
          <tr>
            <td>${escapeHtml(row[0])}</td>
            <td>${escapeHtml(row[1])}</td>
            <td>${escapeHtml(row[2])}</td>
          </tr>
        `).join('');

        return `
          <article class="card-wrap">
            <div class="card ${state.flippedAll ? 'is-flipped' : ''}" data-kana="${escapeHtml(card.kana)}" tabindex="0" role="button" aria-label="${escapeHtml(card.kana)} 卡片，點擊翻面">
              <section class="face front">
                <div class="tag">${escapeHtml(card.row)}</div>
                <div class="art" aria-hidden="true">
                  <div class="motif ${escapeHtml(card.motif)}" title="${escapeHtml(card.art)}">${escapeHtml(card.icon)}</div>
                  <div>
                    <div class="kana">${escapeHtml(card.kana)}</div>
                    <div class="roman">${escapeHtml(card.romaji)}</div>
                  </div>
                </div>
                <div>
                  <div class="hint">主圖：${escapeHtml(card.art)} · ${escapeHtml(card.hint)}</div>
                </div>
              </section>
              <section class="face back">
                <div class="tag">${escapeHtml(card.row)}</div>
                <p class="mini" style="font-size:18px;color:var(--ink);font-weight:700;">
                  ${escapeHtml(card.kana)}｜${escapeHtml(card.romaji)}
                </p>

                <table>
                  <thead>
                    <tr><th>日文</th><th>平假名 / 羅馬拼音</th><th>中文 / English</th></tr>
                  </thead>
                  <tbody>${tableRows}</tbody>
                </table>
                <div class="actions">
                  <button class="play-one" data-romaji="${escapeHtml(card.romaji)}">🔊 單音 mp3</button>
                  <button class="play-words" data-romaji="${escapeHtml(card.romaji)}">▶ 單字 mp3</button>
                </div>
              </section>
            </div>
          </article>
        `;
      }).join('');

      [...grid.querySelectorAll('.card')].forEach(el => {
        el.addEventListener('click', e => {
          if (e.target.closest('.play-one') || e.target.closest('.play-words')) return;
          el.classList.toggle('is-flipped');
        });
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            el.classList.toggle('is-flipped');
          }
        });
      });

[...grid.querySelectorAll('.play-one')].forEach(btn => {
  btn.onclick = async (e) => {
    e.stopPropagation();
    const card = list.find(c => c.romaji === btn.dataset.romaji);
    if (card) {
      setStatus(`播放中：${card.kana}（單音）`);
      try { await playCard(card, 'kana'); }
      catch (err) { setStatus(`找不到音檔：${err.message}，請確認 audio 資料夾與檔名。`, true); }
    }
  };
});

[...grid.querySelectorAll('.play-words')].forEach(btn => {
  btn.onclick = async (e) => {
    e.stopPropagation();
    const card = list.find(c => c.romaji === btn.dataset.romaji);
    if (card) {
      setStatus(`播放中：${card.kana}（單字）`);
      try { await playCard(card, 'words'); }
      catch (err) { setStatus(`找不到音檔：${err.message}，請確認 audio 資料夾與檔名。`, true); }
    }
  };
});
    }

    function shuffle(){
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      renderCards();
    }

    function isLineBrowser(){ return /Line\//i.test(navigator.userAgent); }

    function initLineTip(){
      if (isLineBrowser()){
        const tip = document.getElementById('lineAudioTip');
        const btn = document.getElementById('openExternalBtn');
        if (tip && btn){
          tip.style.display = 'block';
          btn.href = window.location.href;
          btn.target = '_blank';
          btn.rel = 'noopener noreferrer';
        }
      }
    }

    playAllBtn.onclick = async () => {
setStatus(`播放目前卡片：${state.audioMode === 'kana' ? '單音' : '單字'}`);
      await playSequential(currentCards(), state.audioMode);
    };

    shuffleBtn.onclick = shuffle;

    flipAllBtn.onclick = () => {
      state.flippedAll = !state.flippedAll;
      flipAllBtn.textContent = state.flippedAll ? '全部翻回正面' : '全部翻到背面';
      renderCards();
    };

    autoPlayBtn.onclick = async () => {
      state.autoPlay = !state.autoPlay;
      autoPlayBtn.textContent = `自動播放：${state.autoPlay ? '開' : '關'}`;
      autoPlayBtn.classList.toggle('active', state.autoPlay);
      setStatus(`已切換為：自動播放${state.autoPlay ? '開啟' : '關閉'}`);
      if (state.autoPlay) await autoPlayCards();
    };

    searchInput.oninput = () => {
      state.q = searchInput.value;
      renderCards();
    };

    audioMode.onchange = () => {
      state.audioMode = audioMode.value;
      setStatus(`已切換為：${state.audioMode === 'kana' ? '單音' : '單字'} 模式`);
    };

    initLineTip();
    renderFilters();
    renderCards();
  </script>
</body>
</html>
